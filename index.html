<head>

    <!-- 字体引入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <link href="https://fonts.zeoseven.com/items/80/?format=css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 首页专用样式 */
        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8f6f1 0%, #e8e4d9 50%, #f0ece3 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 119, 101, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(107, 91, 79, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            text-align: center;
            z-index: 1;
            padding: 40px 20px;
        }

        .hero-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 4.5rem;
            color: #4a4035;
            margin-bottom: 15px;
            letter-spacing: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        .hero-subtitle {
            font-family: 'LXGW WenKai', serif;
            font-size: 1.3rem;
            color: #8b7765;
            margin-bottom: 60px;
            letter-spacing: 6px;
        }

        /* 三个入口按钮 */
        .hero-entries {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-entry {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.4s ease;
        }

        .hero-entry:hover {
            transform: translateY(-10px);
        }

        .entry-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b7765 0%, #6b5b4f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 10px 40px rgba(107, 91, 79, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .hero-entry:hover .entry-circle {
            box-shadow: 
                0 15px 50px rgba(107, 91, 79, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .entry-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .entry-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem;
            color: #f8f6f1;
            letter-spacing: 4px;
        }

        .entry-label {
            font-family: 'LXGW WenKai', serif;
            font-size: 1rem;
            color: #6b5b4f;
            margin-top: 20px;
            letter-spacing: 3px;
            transition: color 0.3s ease;
        }

        .hero-entry:hover .entry-label {
            color: #4a4035;
        }

        /* 装饰性元素 */
        .decoration-line {
            position: absolute;
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 119, 101, 0.3), transparent);
        }

        .decoration-line.top {
            top: 30%;
            left: 10%;
        }

        .decoration-line.bottom {
            bottom: 30%;
            right: 10%;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 3rem;
                letter-spacing: 8px;
            }

            .hero-subtitle {
                font-size: 1rem;
                letter-spacing: 4px;
            }

            .hero-entries {
                gap: 30px;
            }

            .entry-circle {
                width: 120px;
                height: 120px;
            }

            .entry-text {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .hero-entries {
                flex-direction: column;
                gap: 25px;
            }

            .entry-circle {
                width: 100px;
                height: 100px;
            }

            .entry-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

    <section class="hero-section">

        <div class="hero-content">

    <!-- 关于我区域 -->
    <section id="about" class="about-section">

                这里是静心书斋，一个记录阅读心得、品味经典诗词的个人空间。
