<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静心书斋</title>

    <!-- 字体引入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <link href="https://fonts.zeoseven.com/items/80/?format=css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'LXGW WenKai', serif;
            overflow-x: hidden;
        }

        /* ===== 第一屏 - 动态背景区域 ===== */
        .hero-section {
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 背景图片容器 */
        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1);
            transition: opacity 1s ease-in-out;
        }

        .bg-image.active {
            opacity: 1;
            animation: zoomIn 8s ease-out forwards;
        }

        @keyframes zoomIn {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.15);
            }
        }

        /* 背景遮罩 */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* 中心标题 */
        .center-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        .center-title.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .center-title h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 6rem;
            color: #f8f6f1;
            letter-spacing: 20px;
            text-shadow: 
                0 0 20px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 0, 0, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 
                    0 0 20px rgba(0, 0, 0, 0.5),
                    0 0 40px rgba(0, 0, 0, 0.3),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            100% {
                text-shadow: 
                    0 0 30px rgba(255, 255, 255, 0.2),
                    0 0 60px rgba(0, 0, 0, 0.4),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
        }

        /* 随机诗句容器 */
        .poetry-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .floating-poem {
            position: absolute;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            letter-spacing: 3px;
        }

        .floating-poem.visible {
            opacity: 1;
        }

        /* 向下滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            letter-spacing: 3px;
            animation: bounce 2s infinite;
            cursor: pointer;
            text-decoration: none;
        }

        .scroll-hint::after {
            content: '↓';
            display: block;
            text-align: center;
            margin-top: 5px;
            font-size: 1.5rem;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* ===== 第二屏 - 入口区域 ===== */
        .entries-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 第二屏背景 */
        .entries-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .entries-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        /* 三个入口 */
        .entries-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px;
        }

        .entries-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            color: #f8f6f1;
            margin-bottom: 60px;
            letter-spacing: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero-entries {
            display: flex;
            gap: 60px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-entry {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .hero-entry.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .hero-entry:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .entry-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(139, 119, 101, 0.9) 0%, rgba(107, 91, 79, 0.9) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .hero-entry:hover .entry-circle {
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .entry-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .entry-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2rem;
            color: #f8f6f1;
            letter-spacing: 6px;
        }

        .entry-label {
            font-family: 'LXGW WenKai', serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 20px;
            letter-spacing: 4px;
            transition: color 0.3s ease;
        }

        .hero-entry:hover .entry-label {
            color: #fff;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .center-title h1 {
                font-size: 3.5rem;
                letter-spacing: 10px;
            }

            .floating-poem {
                font-size: 1.1rem;
            }

            .entries-title {
                font-size: 1.8rem;
            }

            .hero-entries {
                gap: 40px;
            }

            .entry-circle {
                width: 130px;
                height: 130px;
            }

            .entry-text {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .center-title h1 {
                font-size: 2.5rem;
                letter-spacing: 6px;
            }

            .hero-entries {
                flex-direction: column;
                gap: 30px;
            }

            .entry-circle {
                width: 110px;
                height: 110px;
            }

            .entry-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- 第一屏 - 动态背景与诗句 -->
    <section class="hero-section" id="hero">
        <!-- 背景图片轮播 -->

        <div class="entries-content">

    <script src="js/main.js"></script>
    <script>
        // ===== 配置 =====
        const CONFIG = {
        // 背景图片路径（GitHub raw URL）
        backgroundImages: [
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/Ammonite%20fossil%20from%20Madagascar.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/Merced%20River%2C%20Yosemite%20Natioanl%20Park%2C%20California.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/%E4%BC%8A%E6%96%AF%E7%89%B9%E6%9C%AC%E6%B5%B7%E5%B2%B8%EF%BC%8C%E4%B8%9C%E8%90%A8%E5%A1%9E%E5%85%8B%E6%96%AF%E9%83%A1%EF%BC%8C%E8%8B%B1%E6%A0%BC%E5%85%B0.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/%E5%9C%A3%E8%AF%9E%E6%98%9F%E5%BD%A2%E7%81%AF%E7%AC%BC%EF%BC%8C%E5%BE%B7%E5%9B%BD.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/%E6%97%A5%E5%87%BA%E6%97%B6%E5%88%86%EF%BC%8C%E9%A9%AC%E7%89%B9%E6%B4%AA%E5%B3%B0%E7%9A%84%E5%80%92%E5%BD%B1%E6%98%A0%E7%85%A7%E5%9C%A8%E6%96%AF%E7%89%B9%E5%88%A9%E6%B9%96%E4%B8%AD%EF%BC%8C%E9%87%87%E5%B0%94%E9%A9%AC%E7%89%B9%EF%BC%8C%E7%91%9E%E5%A3%AB.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/%E6%96%B0%E5%A4%A9%E9%B9%85%E5%A0%A1%EF%BC%8C%E5%B7%B4%E4%BC%90%E5%88%A9%E4%BA%9A%E5%B7%9E%EF%BC%8C%E5%BE%B7%E5%9B%BD.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/%E7%99%BD%E6%B2%99%E5%9B%BD%E5%AE%B6%E5%85%AC%E5%9B%AD%EF%BC%8C%E6%96%B0%E5%A2%A8%E8%A5%BF%E5%93%A5%E5%B7%9E%EF%BC%8C%E7%BE%8E%E5%9B%BD.jpg',
            'https://raw.githubusercontent.com/Airsforever-DNA/Reading-Ledger/main/images/backgrounds/%E8%88%8D%E5%A4%AB%E6%B2%99%E4%B8%87%E7%9A%84%E8%93%9D%E8%89%B2%E5%A2%99%E5%A3%81%EF%BC%8C%E6%91%A9%E6%B4%9B%E5%93%A5.jpg'
        ],
            // 诗句库
            poems: [
                '西风吹老洞庭波',
                '一夜湘君白发多',
                '醉后不知天在水',
                '满船清梦压星河',
                '床前明月光',
                '疑是地上霜',
                '举头望明月',
                '低头思故乡',
                '国破山河在',
                '城春草木深',
                '感时花溅泪',
                '恨别鸟惊心'
            ],
            // 标题显示时间（毫秒）
            titleDisplayTime: 20000,
            // 每张图片显示时间（毫秒）
            imageDisplayTime: 8000,
            // 每句诗显示时间（毫秒）
            poemDisplayTime: 5000,
            // 同时显示的诗句数量
            poemCount: 6
        };

        // ===== 背景图片轮播 =====
        class BackgroundSlider {
            constructor() {
                this.container = document.getElementById('bgSlider');
                this.entriesBg = document.getElementById('entriesBg');
                this.images = [];
                this.currentIndex = 0;
                this.usedIndices = new Set();
                this.init();
            }

            init() {
                // 创建背景图片元素
                CONFIG.backgroundImages.forEach((src, index) => {
                    const div = document.createElement('div');
                    div.className = 'bg-image';
                    div.style.backgroundImage = `url('${src}')`;
                    this.container.appendChild(div);
                    this.images.push(div);
                });

                // 设置第二屏背景为第一张图
                if (CONFIG.backgroundImages.length > 0) {
                    this.entriesBg.style.backgroundImage = `url('${CONFIG.backgroundImages[0]}')`;
                }

                this.start();
            }

            getNextIndex() {
                // 如果所有图片都播放过，重置
                if (this.usedIndices.size >= this.images.length) {
                    this.usedIndices.clear();
                }

                // 随机选择一个未播放的图片
                let availableIndices = [];
                for (let i = 0; i < this.images.length; i++) {
                    if (!this.usedIndices.has(i)) {
                        availableIndices.push(i);
                    }
                }

                const nextIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
                this.usedIndices.add(nextIndex);
                return nextIndex;
            }

            start() {
                // 显示第一张
                this.showImage(0);
                this.usedIndices.add(0);

                // 定时切换
                setInterval(() => {
                    const nextIndex = this.getNextIndex();
                    this.showImage(nextIndex);
                }, CONFIG.imageDisplayTime);
            }

            showImage(index) {
                // 移除所有 active
                this.images.forEach(img => img.classList.remove('active'));
                // 添加 active 到当前图片
                this.images[index].classList.add('active');
                this.currentIndex = index;

                // 同步更新第二屏背景
                const currentSrc = CONFIG.backgroundImages[index];
                this.entriesBg.style.backgroundImage = `url('${currentSrc}')`;
            }
        }

        // ===== 中心标题控制 =====
        class TitleController {
            constructor() {
                this.title = document.getElementById('centerTitle');
                this.init();
            }

            init() {
                // 20秒后隐藏标题
                setTimeout(() => {
                    this.hide();
                }, CONFIG.titleDisplayTime);
            }

            hide() {
                this.title.classList.add('hidden');
                // 触发诗句范围扩展事件
                window.dispatchEvent(new CustomEvent('titleHidden'));
            }

            isVisible() {
                return !this.title.classList.contains('hidden');
            }
        }

        // ===== 随机诗句管理 =====
        class FloatingPoems {
            constructor() {
                this.container = document.getElementById('poetryContainer');
                this.poems = CONFIG.poems;
                this.activePoems = [];
                this.titleVisible = true;
                this.init();
            }

            init() {
                // 监听标题隐藏事件
                window.addEventListener('titleHidden', () => {
                    this.titleVisible = false;
                });

                // 开始显示诗句
                this.start();
            }

            getRandomPosition() {
                const viewportW = window.innerWidth;
                const viewportH = window.innerHeight;
                const margin = 100;

                if (this.titleVisible) {
                    // 标题显示期间：在周边显示（避开中心区域）
                    const centerX = viewportW / 2;
                    const centerY = viewportH / 2;
                    const excludeRadius = Math.min(viewportW, viewportH) * 0.35;

                    let x, y, distance;
                    do {
                        x = margin + Math.random() * (viewportW - margin * 2);
                        y = margin + Math.random() * (viewportH - margin * 2);
                        distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                    } while (distance < excludeRadius);

                    return { x, y };
                } else {
                    // 标题消失后：全屏范围内随机
                    return {
                        x: margin + Math.random() * (viewportW - margin * 2),
                        y: margin + Math.random() * (viewportH - margin * 2)
                    };
                }
            }

            createPoem() {
                const poemText = this.poems[Math.floor(Math.random() * this.poems.length)];
                const pos = this.getRandomPosition();

                const poemEl = document.createElement('div');
                poemEl.className = 'floating-poem';
                poemEl.textContent = poemText;
                poemEl.style.left = pos.x + 'px';
                poemEl.style.top = pos.y + 'px';

                this.container.appendChild(poemEl);

                // 触发动画
                requestAnimationFrame(() => {
                    poemEl.classList.add('visible');
                });

                // 5秒后移除
                setTimeout(() => {
                    poemEl.classList.remove('visible');
                    setTimeout(() => {
                        poemEl.remove();
                    }, 800);
                }, CONFIG.poemDisplayTime);
            }

            start() {
                // 初始显示一批诗句（每隔5秒显示一句）
                for (let i = 0; i < CONFIG.poemCount; i++) {
                    setTimeout(() => this.createPoem(), i * CONFIG.poemDisplayTime);
                }

                // 持续创建新诗句（每5秒创建一句）
                setInterval(() => {
                    this.createPoem();
                }, CONFIG.poemDisplayTime);
            }
        }

        // ===== 入口动画控制 =====
        class EntriesAnimation {
            constructor() {
                this.entries = document.querySelectorAll('.hero-entry');
                this.entriesSection = document.getElementById('entries');
                this.hasAnimated = false;
                this.init();
            }

            init() {
                // 使用 Intersection Observer 监听第二屏
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !this.hasAnimated) {
                            this.animate();
                            this.hasAnimated = true;
                        }
                    });
                }, {
                    threshold: 0.3
                });

                observer.observe(this.entriesSection);
            }

            animate() {
                this.entries.forEach((entry, index) => {
                    const delay = parseInt(entry.dataset.delay) || 0;
                    setTimeout(() => {
                        entry.classList.add('visible');
                    }, delay);
                });
            }
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            new BackgroundSlider();
            new TitleController();
            new FloatingPoems();
            new EntriesAnimation();
        });
    </script>
</body>
