<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静心书斋</title>

    <!-- 字体引入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            font-family: 'LXGW WenKai', serif;
            overflow-x: hidden;
            background: #0a0a0a;
        }

        /* ===== 全局背景图层（固定，两页共享） ===== */
        .global-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            will-change: transform;
            /* opacity 和 transform 完全由 JS 精确控制 */
        }

        /* 背景遮罩（轻微，仅辅助文字可读性） */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== 第一屏 - 英雄区域 ===== */
        .hero-section {
            height: 100vh;
            position: relative;
            z-index: 2;
            overflow: hidden;
            scroll-snap-align: start;
        }

        /* 中心标题 "静心书斋" */
        .center-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
            animation: titleFadeIn 2s ease-out 0.5s forwards;
            transition: opacity 1.5s ease-out;
        }

        .center-title.hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        @keyframes titleFadeIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .center-title h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 6rem;
            color: rgba(248, 246, 241, 0.95);
            letter-spacing: 20px;
            text-shadow:
                0 0 30px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(0, 0, 0, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.9);
            animation: titleGlow 4s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 0, 0, 0.3), 2px 2px 4px rgba(0, 0, 0, 0.9); }
            100% { text-shadow: 0 0 40px rgba(255, 255, 255, 0.15), 0 0 80px rgba(0, 0, 0, 0.4), 2px 2px 4px rgba(0, 0, 0, 0.9), 0 0 100px rgba(255, 255, 255, 0.05); }
        }

        /* 诗句容器 - 跟随第一屏 */
        .poetry-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .floating-poem {
            position: absolute;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            letter-spacing: 4px;
            pointer-events: none;
        }

        .floating-poem.visible {
            opacity: 1;
        }

        /* 向下滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 3px;
            animation: bounce 2.5s ease-in-out infinite;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .scroll-hint::after {
            content: '↓';
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 1.4rem;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-12px); }
            60% { transform: translateX(-50%) translateY(-6px); }
        }

        /* ===== 第二屏 - 入口区域 ===== */
        .entries-section {
            min-height: 100vh;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            scroll-snap-align: start;
        }

        /* 第二屏额外遮罩（稍深一点，让入口标签更清晰） */
        .entries-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 0;
        }

        /* 入口内容 */
        .entries-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px;
        }

        .entries-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            color: #f8f6f1;
            margin-bottom: 60px;
            letter-spacing: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .entries-title.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-entries {
            display: flex;
            gap: 60px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-entry {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .hero-entry.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .hero-entry:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .entry-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(139, 119, 101, 0.85) 0%, rgba(107, 91, 79, 0.85) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .hero-entry:hover .entry-circle {
            box-shadow:
                0 15px 50px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .entry-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .entry-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2rem;
            color: #f8f6f1;
            letter-spacing: 6px;
        }

        .entry-label {
            font-family: 'LXGW WenKai', serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 20px;
            letter-spacing: 4px;
            transition: color 0.3s ease;
        }

        .hero-entry:hover .entry-label {
            color: #fff;
        }

        /* ===== 关于我区域 ===== */
        .about-section {
            padding: 100px 20px;
            background: linear-gradient(135deg, rgba(248, 246, 241, 0.95) 0%, rgba(232, 228, 217, 0.95) 100%);
            text-align: center;
            position: relative;
            z-index: 3;
        }

        .about-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .about-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            color: #4a4035;
            margin-bottom: 30px;
            letter-spacing: 8px;
        }

        .about-text {
            font-size: 1.1rem;
            color: #6b5b4f;
            line-height: 2;
            letter-spacing: 2px;
        }

        /* ===== 页脚 ===== */
        .footer {
            padding: 30px 20px;
            background: #4a4035;
            text-align: center;
            position: relative;
            z-index: 3;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(248, 246, 241, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-100%);
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .navbar.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .nav-logo a {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: #4a4035;
            text-decoration: none;
            letter-spacing: 4px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #6b5b4f;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #4a4035;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #8b7355;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .center-title h1 {
                font-size: 3.5rem;
                letter-spacing: 10px;
            }

            .floating-poem {
                font-size: 1.2rem;
            }

            .entries-title {
                font-size: 1.8rem;
            }

            .hero-entries {
                gap: 40px;
            }

            .entry-circle {
                width: 130px;
                height: 130px;
            }

            .entry-text {
                font-size: 1.6rem;
            }

            .navbar {
                padding: 0 20px;
            }

            .nav-links {
                gap: 15px;
            }

            .nav-links a {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                display: none;
            }

            .center-title h1 {
                font-size: 2.5rem;
                letter-spacing: 6px;
            }

            .hero-entries {
                flex-direction: column;
                gap: 30px;
            }

            .entry-circle {
                width: 110px;
                height: 110px;
            }

            .entry-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

            poems: [
                '腹有诗书气自华',
                '读书破万卷，下笔如有神',
                '书卷多情似故人',
                '晨昏忧乐每相亲',
                '非淡泊无以明志',
                '非宁静无以致远',
                '书犹药也，善读之可以医愚',
                '不积跬步，无以至千里',
                '不积小流，无以成江海',
                '纸上得来终觉浅',
                '绝知此事要躬行',
                '三更灯火五更鸡',
                '正是男儿读书时',
                '黑发不知勤学早',
                '白首方悔读书迟',
                '少壮不努力，老大徒伤悲',
                '旧书不厌百回读',
                '熟读精思子自知',
                '读万卷书，行万里路',
                '养心莫善寡欲',
                '至乐无如读书',
                '锲而不舍，金石可镂',
                '莫等闲，白了少年头',
                '发奋识遍天下字',
                '立志读尽人间书',
                '书到用时方恨少',
                '事非经过不知难',
                '积财千万，无过读书',
                '立身以立学为先',
                '立学以读书为本',
                '读书百遍，其义自见',
                '鸟欲高飞先振翅',
                '人求上进先读书'

        //   0s~3s: 渐明过程（brightness 0.05 → 1）
        //   3s~7s: 正常显示，继续放大
        //   7s~10s: 渐暗过程（brightness 1 → 0.05）
        //   10s: 切换到下一张，新图从暗开始渐明
        // 两张图之间：上一张在最后3秒渐暗，下一张在前3秒渐明
        // 过渡期间两张图重叠3秒
        class BackgroundSlider {
            constructor() {
                this.container = document.getElementById('globalBg');
                this.shuffledIndices = [];
                this.currentPlayIndex = 0;
                this.currentEl = null;
                this.currentRAF = null;
                this.backgroundImages = CONFIG.backgroundImages;
                this.preloadedImages = new Set();
            }

            init() {
                this.reshuffle();
                this.startImage(this.shuffledIndices[0], true);
                this.preloadNext();
            }

            reshuffle() {
                this.shuffledIndices = Array.from({ length: this.backgroundImages.length }, (_, i) => i);
                for (let i = this.shuffledIndices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.shuffledIndices[i], this.shuffledIndices[j]] = [this.shuffledIndices[j], this.shuffledIndices[i]];
                }
            }

            preloadNext() {
                const nextPlayIndex = this.currentPlayIndex + 1;
                const idx = nextPlayIndex < this.shuffledIndices.length
                    ? this.shuffledIndices[nextPlayIndex]
                    : null;
                if (idx !== null) {
                    const src = this.backgroundImages[idx];
                    if (!this.preloadedImages.has(src)) {
                        const img = new Image();
                        img.src = src;
                        this.preloadedImages.add(src);
                    }
                }
            }

            scheduleNext() {
                // 在当前图的第7秒（即渐暗开始时），启动下一张
                // 下一张会花3秒渐明，正好与当前图最后3秒渐暗重叠
                const fadeStart = CONFIG.imageDisplayTime - CONFIG.fadeDuration;
                setTimeout(() => {
                    this.currentPlayIndex++;
                    if (this.currentPlayIndex >= this.shuffledIndices.length) {
                        this.reshuffle();
                        this.currentPlayIndex = 0;
                    }
                    this.preloadNext();
                    this.startImage(this.shuffledIndices[this.currentPlayIndex], false);
                }, fadeStart);
            }

            startImage(imgIndex, isFirst) {
                const src = this.backgroundImages[imgIndex];
                const totalDuration = CONFIG.imageDisplayTime;
                const fadeDuration = CONFIG.fadeDuration;
                const targetScale = CONFIG.zoomScale;

                // 创建DOM元素
                const div = document.createElement('div');
                div.className = 'bg-image';
                div.style.backgroundImage = `url('${src}')`;
                div.style.opacity = '1';
                // 第一张直接明亮出现，后续从暗开始
                div.style.filter = isFirst ? 'brightness(1)' : 'brightness(0.05)';
                div.style.transform = 'scale(1)';
                this.container.appendChild(div);

                // 记录为当前元素
                const prevEl = this.currentEl;
                this.currentEl = div;

                // 用 requestAnimationFrame 精确驱动时间线
                const startTime = performance.now();

                const animate = (now) => {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / totalDuration, 1);

                    // 1. 放大：线性从 1 到 targetScale
                    const scale = 1 + (targetScale - 1) * progress;
                    div.style.transform = `scale(${scale})`;

                    // 2. 亮度控制
                    let brightness;
                    if (isFirst) {
                        // 第一张：直接明亮，后7秒~10秒渐暗
                        const fadeStartRatio = 1 - fadeDuration / totalDuration; // 0.7
                        if (progress < fadeStartRatio) {
                            brightness = 1;
                        } else {
                            const fadeProgress = (progress - fadeStartRatio) / (1 - fadeStartRatio);
                            brightness = 1 - fadeProgress * 0.95; // 1 → 0.05
                        }
                    } else {
                        // 非第一张：前3秒渐明，中间正常，后3秒渐暗
                        const fadeInEndRatio = fadeDuration / totalDuration; // 0.3
                        const fadeOutStartRatio = 1 - fadeDuration / totalDuration; // 0.7
                        if (progress < fadeInEndRatio) {
                            // 渐明: 0.05 → 1
                            const fadeProgress = progress / fadeInEndRatio;
                            brightness = 0.05 + fadeProgress * 0.95;
                        } else if (progress < fadeOutStartRatio) {
                            // 正常显示
                            brightness = 1;
                        } else {
                            // 渐暗: 1 → 0.05
                            const fadeProgress = (progress - fadeOutStartRatio) / (1 - fadeOutStartRatio);
                            brightness = 1 - fadeProgress * 0.95;
                        }
                    }
                    div.style.filter = `brightness(${brightness})`;

                    // 3. 如果渐明完成，移除上一张图
                    if (!isFirst && prevEl && elapsed >= fadeDuration + 200) {
                        if (prevEl.parentNode) prevEl.remove();
                        // 清空引用避免重复删除
                    }

                    // 4. 继续动画直到10秒结束
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 动画结束，移除此元素（下一张会接管）
                        // 此时下一张已经在3秒前启动了
                        setTimeout(() => {
                            if (div.parentNode && div !== this.currentEl) {
                                div.remove();
                            }
                        }, 500);
                    }
                };

                requestAnimationFrame(animate);

                // 安排下一张
                this.scheduleNext();
            }
        }

        // ===== 中心标题控制 =====
        class TitleController {
            constructor() {
                this.title = document.getElementById('centerTitle');
                this.isVisible = true;
            }

            init() {
                // 20秒后隐藏标题
                setTimeout(() => {
                    this.hide();
                }, CONFIG.titleDisplayTime);
            }

            hide() {
                this.title.classList.add('hidden');
                this.isVisible = false;
                // 触发事件通知诗句管理器
                window.dispatchEvent(new CustomEvent('titleHidden'));
            }
        }

        // ===== 随机诗句管理 =====
        class FloatingPoems {
            constructor() {
                this.container = document.getElementById('poetryContainer');
                this.poems = [...CONFIG.poems];
                this.titleVisible = true;
                this.isInHeroSection = true;
                this.usedPoems = new Set();
                this.shuffledPoems = [];
                this.poemPlayIndex = 0;
            }

            init() {
                // 监听标题隐藏
                window.addEventListener('titleHidden', () => {
                    this.titleVisible = false;
                });

                // 初始洗牌
                this.reshufflePoems();

                // 开始显示
                this.createPoem();
                setInterval(() => {
                    if (this.isInHeroSection) {
                        this.createPoem();
                    }
                }, CONFIG.poemDisplayTime);
            }

            reshufflePoems() {
                this.shuffledPoems = [...this.poems];
                for (let i = this.shuffledPoems.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.shuffledPoems[i], this.shuffledPoems[j]] = [this.shuffledPoems[j], this.shuffledPoems[i]];
                }
                this.poemPlayIndex = 0;
            }

            getNextPoem() {
                if (this.poemPlayIndex >= this.shuffledPoems.length) {
                    this.reshufflePoems();
                }
                return this.shuffledPoems[this.poemPlayIndex++];
            }

            getRandomPosition() {
                const viewportW = window.innerWidth;
                const viewportH = window.innerHeight;
                const marginX = 80;
                const marginTop = 80;
                const marginBottom = 120;

                if (this.titleVisible) {
                    // 标题显示时：在周边显示（避开中心大约35%区域）
                    const centerX = viewportW / 2;
                    const centerY = viewportH / 2;
                    const excludeW = viewportW * 0.35;
                    const excludeH = viewportH * 0.2;

                    let x, y, attempts = 0;
                    do {
                        x = marginX + Math.random() * (viewportW - marginX * 2);
                        y = marginTop + Math.random() * (viewportH - marginTop - marginBottom);
                        attempts++;
                    } while (
                        Math.abs(x - centerX) < excludeW &&
                        Math.abs(y - centerY) < excludeH &&
                        attempts < 50
                    );

                    return { x, y };
                } else {
                    // 标题消失后：全屏范围内随机
                    return {
                        x: marginX + Math.random() * (viewportW - marginX * 2),
                        y: marginTop + Math.random() * (viewportH - marginTop - marginBottom)
                    };
                }
            }

            createPoem() {
                const poemText = this.getNextPoem();
                const pos = this.getRandomPosition();

                const poemEl = document.createElement('div');
                poemEl.className = 'floating-poem';
                poemEl.textContent = poemText;
                poemEl.style.left = pos.x + 'px';
                poemEl.style.top = pos.y + 'px';

                // 随机小幅字体变化
                const fontSize = 1.4 + Math.random() * 0.6;
                poemEl.style.fontSize = fontSize.toFixed(2) + 'rem';

                this.container.appendChild(poemEl);

                // 淡入
                requestAnimationFrame(() => {
                    poemEl.classList.add('visible');
                });

                // 5秒后淡出并移除
                setTimeout(() => {
                    poemEl.classList.remove('visible');
                    setTimeout(() => {
                        if (poemEl.parentNode) poemEl.remove();
                    }, 1000);
                }, CONFIG.poemDisplayTime);
            }

            setHeroSection(isInHero) {
                this.isInHeroSection = isInHero;
                // 如果离开第一屏，清除所有诗句
                if (!isInHero) {
                    const poems = this.container.querySelectorAll('.floating-poem');
                    poems.forEach(p => {
                        p.classList.remove('visible');
                        setTimeout(() => { if (p.parentNode) p.remove(); }, 1000);
                    });
                }
            }
        }

        // ===== 入口动画 + 导航栏控制 =====
        class ScrollController {
            constructor(poemsManager) {
                this.entries = document.querySelectorAll('.hero-entry');
                this.entriesTitle = document.getElementById('entriesTitle');
                this.entriesSection = document.getElementById('entries');
                this.navbar = document.getElementById('navbar');
                this.hasAnimated = false;
                this.poemsManager = poemsManager;
            }

            init() {
                // 使用 IntersectionObserver 监听第二屏
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            // 进入第二屏
                            this.showNavbar();
                            this.animateEntries();
                            this.poemsManager.setHeroSection(false);
                        } else {
                            // 回到第一屏
                            this.hideNavbar();
                            this.poemsManager.setHeroSection(true);
                        }
                    });
                }, {
                    threshold: 0.15
                });

                observer.observe(this.entriesSection);
            }

            showNavbar() {
                this.navbar.classList.add('visible');
            }

            hideNavbar() {
                this.navbar.classList.remove('visible');
            }

            animateEntries() {
                if (this.hasAnimated) return;
                this.hasAnimated = true;

                // 标题先出现
                this.entriesTitle.classList.add('visible');

                // 入口依次出现
                this.entries.forEach((entry) => {
                    const delay = parseInt(entry.dataset.delay) || 0;
                    setTimeout(() => {
                        entry.classList.add('visible');
                    }, delay + 300);
                });
            }
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            const slider = new BackgroundSlider();
            slider.init();

            const titleCtrl = new TitleController();
            titleCtrl.init();

            const poems = new FloatingPoems();
            poems.init();

            const scrollCtrl = new ScrollController(poems);
            scrollCtrl.init();
        });
    </script>
</body>
